name: Daily Cambridge Sanitation Dashboard Update
on:
  schedule:
    - cron: '0 22 * * *' # Runs at 5 PM EST
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    env:
      CAMBRIDGE_CITY_SECRET: ${{ secrets.CITY_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # Added numpy and nltk for your analysis cells
          pip install papermill ipykernel pandas sodapy requests matplotlib seaborn nltk numpy

      - name: Execute Notebook
        run: |
          papermill Project1.ipynb output_results.ipynb

      - name: Commit and Push CSV changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          # This only commits if there are actually changes in the CSV files
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily sanitation data" && git push)
