name: Daily Cambridge Sanitation Dashboard Update
on:
  schedule:
    # 6:00 PM EST (Cambridge Time) is 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    env:
      # This bridges the GitHub secret to your Python code
      CAMBRIDGE_CITY_SECRET: ${{ secrets.CITY_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install papermill ipykernel pandas sodapy requests

      - name: Execute Notebook
        run: |
          # CHANGE THIS to your actual filename (e.g., project_dashboard.ipynb)
          papermill Copy of Project 1.ipynb output_results.ipynb

      - name: Upload Finished Notebook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-dashboard-output
          path: output_results.ipynb
