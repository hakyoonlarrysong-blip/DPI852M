name: Daily Cambridge Sanitation Dashboard Update
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    env:
      CAMBRIDGE_CITY_SECRET: ${{ secrets.CITY_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # Added nltk for your sentiment analysis
          pip install papermill ipykernel pandas sodapy requests matplotlib seaborn nltk

      - name: Execute Notebook
        run: |
          papermill Project1.ipynb output_results.ipynb

      - name: Upload Finished Notebook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-dashboard-output
          path: output_results.ipynb
